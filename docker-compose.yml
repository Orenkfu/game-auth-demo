services:
  redis:
    image: redis:alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  postgres:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: gameauth
      POSTGRES_PASSWORD: gameauth
      POSTGRES_DB: gameauth
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gameauth"]
      interval: 5s
      timeout: 3s
      retries: 5
    volumes:
      - postgres_data:/var/lib/postgresql/data

  minio:
    image: minio/minio
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 3s
      retries: 5

  minio-init:
    image: minio/mc
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      sh -c "mc alias set local http://minio:9000 minioadmin minioadmin &&
             mc mb --ignore-existing local/game-auth-videos &&
             printf '{\"CORSRules\":[{\"AllowedOrigins\":[\"*\"],\"AllowedMethods\":[\"GET\",\"PUT\",\"HEAD\"],\"AllowedHeaders\":[\"*\"],\"ExposeHeaders\":[\"ETag\"],\"MaxAgeSeconds\":3000}]}' > /tmp/cors.json &&
             (mc cors set local/game-auth-videos /tmp/cors.json || echo 'WARN: mc cors not supported in this mc version, configure CORS via MinIO console at :9001')"

  backend:
    build:
      context: ./backend
    ports:
      - "3001:3001"
    env_file:
      - ./backend/.env
    environment:
      USE_REDIS: "true"
      REDIS_URL: redis://redis:6379
      USE_POSTGRES: "true"
      DATABASE_URL: postgresql://gameauth:gameauth@postgres:5432/gameauth
      STORAGE_ENDPOINT: http://minio:9000
      STORAGE_PUBLIC_ENDPOINT: http://localhost:9000
      STORAGE_BUCKET: game-auth-videos
      STORAGE_REGION: us-east-1
      AWS_ACCESS_KEY_ID: minioadmin
      AWS_SECRET_ACCESS_KEY: minioadmin
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully

  ingestor:
    build:
      context: ./ingestor
    ports:
      - "3002:3002"
    environment:
      REDIS_ADDR: redis:6379
    depends_on:
      redis:
        condition: service_healthy

  consumer:
    build:
      context: ./consumer
    ports:
      - "3003:3003"
    environment:
      REDIS_ADDR: redis:6379
      DUCKDB_PATH: /data/events.duckdb
    volumes:
      - duckdb_data:/data
    depends_on:
      redis:
        condition: service_healthy

volumes:
  postgres_data:
  duckdb_data:
  minio_data:
